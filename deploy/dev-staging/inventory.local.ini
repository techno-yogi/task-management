# Inventory used by deploy/dev-staging/dev_staging.ps1.
# Targets the linux_staging container over the shared compose bridge network,
# reached by hostname `linux_staging`. The ansible_runner copies the bind-
# mounted private key into /root/.ssh/id_ed25519 with mode 0600 at startup.

[app]
linux_staging ansible_host=linux_staging ansible_user=deploy ansible_port=22 ansible_ssh_private_key_file=/root/.ssh/id_ed25519 ansible_become=true ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
