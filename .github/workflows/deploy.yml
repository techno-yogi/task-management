name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Optional image tag override (defaults to commit SHA)
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'manual' }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository }}:latest

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Pinned host fingerprint (no TOFU). Generate once per host with:
      #   ssh-keyscan -t ed25519,ecdsa,rsa <host>
      # and paste the multi-line output into the SSH_KNOWN_HOSTS env secret.
      - name: Pin target host fingerprint
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if ! grep -q . ~/.ssh/known_hosts; then
            echo "::error::SSH_KNOWN_HOSTS secret is empty. Run ssh-keyscan against your target and store the output."
            exit 1
          fi

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9,<11"
          ansible-galaxy collection install -r deploy/requirements.yml

      # Render extra-vars to a YAML file rather than passing 18 -e flags. The
      # file is created with a tight umask and deleted at the end of the job.
      - name: Render Ansible extra-vars
        env:
          APP_IMAGE: ghcr.io/${{ github.repository }}
          APP_IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          APP_ENV: ${{ secrets.APP_ENV }}
          APP_PORT: ${{ secrets.APP_PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL_ASYNC: ${{ secrets.DATABASE_URL_ASYNC }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          APP_CELERY_BROKER_URL: ${{ secrets.APP_CELERY_BROKER_URL }}
          APP_CELERY_RESULT_BACKEND: ${{ secrets.APP_CELERY_RESULT_BACKEND }}
          WEB_CONCURRENCY: ${{ secrets.WEB_CONCURRENCY }}
          CELERY_WORKER_CONCURRENCY: ${{ secrets.CELERY_WORKER_CONCURRENCY }}
          WORKER_EXEC_REPLICAS: ${{ vars.WORKER_EXEC_REPLICAS || '12' }}
          WORKER_AGGREGATE_REPLICAS: ${{ vars.WORKER_AGGREGATE_REPLICAS || '2' }}
          WORKER_SWEEP_FINALIZE_REPLICAS: ${{ vars.WORKER_SWEEP_FINALIZE_REPLICAS || '2' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          umask 177
          python - <<'PY' > deploy_vars.yml
          import json, os
          out = {
              "app_image": os.environ["APP_IMAGE"],
              "app_image_tag": os.environ["APP_IMAGE_TAG"],
              "app_env": os.environ["APP_ENV"],
              "app_port": os.environ["APP_PORT"],
              "postgres_user": os.environ["POSTGRES_USER"],
              "postgres_password": os.environ["POSTGRES_PASSWORD"],
              "postgres_db": os.environ["POSTGRES_DB"],
              "secret_key": os.environ["SECRET_KEY"],
              "database_url_async": os.environ["DATABASE_URL_ASYNC"],
              "database_url_sync": os.environ["DATABASE_URL_SYNC"],
              "app_celery_broker_url": os.environ["APP_CELERY_BROKER_URL"],
              "app_celery_result_backend": os.environ["APP_CELERY_RESULT_BACKEND"],
              "web_concurrency": os.environ["WEB_CONCURRENCY"],
              "celery_worker_concurrency": os.environ["CELERY_WORKER_CONCURRENCY"],
              "worker_exec_replicas": os.environ["WORKER_EXEC_REPLICAS"],
              "worker_aggregate_replicas": os.environ["WORKER_AGGREGATE_REPLICAS"],
              "worker_sweep_finalize_replicas": os.environ["WORKER_SWEEP_FINALIZE_REPLICAS"],
              "ghcr_username": os.environ["GHCR_USERNAME"],
              "ghcr_token": os.environ["GHCR_TOKEN"],
          }
          import json as _json
          print(_json.dumps(out))
          PY

      - name: Deploy with Ansible
        run: |
          ansible-playbook \
            -i deploy/inventory/${{ inputs.environment }}.ini \
            deploy/playbooks/deploy.yml \
            -e target_env=${{ inputs.environment }} \
            -e @deploy_vars.yml

      - name: Cleanup secrets on runner
        if: always()
        run: |
          rm -f deploy_vars.yml ~/.ssh/known_hosts
