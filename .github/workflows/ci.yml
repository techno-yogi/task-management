name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

concurrency:
  # Cancel in-flight runs of the same workflow + ref so a quick fixup push
  # supersedes the prior run.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev || uv sync --all-extras --dev

      - name: Ruff lint
        # Non-blocking until we land a clean baseline; surfaces issues without
        # failing the build for now (flip `continue-on-error` to false later).
        run: uv run ruff check .
        continue-on-error: true

      - name: Pytest (fast suite — sqlite, no live workers)
        run: uv run pytest -q tests/test_app.py -k "not live_worker"
